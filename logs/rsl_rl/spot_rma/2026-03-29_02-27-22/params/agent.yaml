seed: 42
device: cuda:0
num_steps_per_env: 24
max_iterations: 5000
empirical_normalization: false
obs_groups: {}
clip_actions: null
save_interval: 500
experiment_name: spot_rma
run_name: ''
logger: wandb
neptune_project: isaaclab
wandb_project: Vision_RMA
resume: false
load_run: .*
load_checkpoint: model_.*.pt
class_name: OnPolicyRunner
policy:
  class_name: BasePolicy
  init_noise_std: 1.0
  noise_std_type: scalar
  actor_obs_normalization: {}
  critic_obs_normalization: {}
  actor_hidden_dims:
  - 512
  - 256
  - 128
  critic_hidden_dims:
  - 512
  - 256
  - 128
  activation: elu
  encoder_hidden_dims:
  - 256
  - 128
  prev_step_size: 48
  z_size: 8
algorithm:
  class_name: PPO
  num_learning_epochs: 5
  num_mini_batches: 4
  learning_rate: 0.001
  schedule: adaptive
  gamma: 0.99
  lam: 0.95
  entropy_coef: 0.0025
  desired_kl: 0.01
  max_grad_norm: 1.0
  value_loss_coef: 0.5
  use_clipped_value_loss: true
  clip_param: 0.2
  normalize_advantage_per_mini_batch: false
  rnd_cfg: null
  symmetry_cfg: null
store_code_state: false
obs_group:
  policy:
  - policy
  priv_obs:
  - priv_obs
